<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Drops · Panel Organizador</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=Syne:wght@700;800;900&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --g:#16a86b;--gd:#0d7a4e;--gl:rgba(22,168,107,.12);
  --r:#ef4444;--y:#f59e0b;--b:#3b82f6;--pu:#8b5cf6;
  --bg:#0a0a0f;--bg2:#111118;--bg3:#1a1a24;--bg4:#22222f;
  --bd:#2a2a3a;--tx:#f0f0f8;--tx2:#9090b0;--tx3:#555570;
  --rad:12px;--rads:8px;--f:'Inter',-apple-system,sans-serif;
}
html,body{height:100%;background:var(--bg);color:var(--tx);font-family:var(--f);-webkit-font-smoothing:antialiased;}
/* LOGIN */
#login{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;padding:24px;z-index:100;}
.login-box{width:100%;max-width:360px;}
.login-logo{font-family:'Syne',sans-serif;font-size:36px;font-weight:900;text-align:center;margin-bottom:4px;letter-spacing:-1px;}
.login-logo span{color:var(--g);}
.login-sub{text-align:center;color:var(--tx3);font-size:11px;letter-spacing:.15em;text-transform:uppercase;margin-bottom:28px;}
.lf label{display:block;font-size:11px;color:var(--tx3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:5px;}
.lf input{width:100%;background:var(--bg3);border:1px solid var(--bd);border-radius:var(--rads);padding:11px 13px;color:var(--tx);font-family:var(--f);font-size:14px;outline:none;margin-bottom:10px;}
.lf input:focus{border-color:var(--g);}
.lbtn{width:100%;padding:13px;background:var(--g);border:none;border-radius:var(--rads);color:#fff;font-family:'Syne',sans-serif;font-size:15px;font-weight:800;cursor:pointer;margin-top:8px;}
.lbtn:hover{background:var(--gd);}
.lerr{color:var(--r);font-size:12px;text-align:center;margin-top:8px;min-height:18px;}
/* APP */
#app{display:none;height:100vh;overflow:hidden;}
#app.show{display:flex;flex-direction:column;}
/* TOPBAR */
.topbar{background:var(--bg2);border-bottom:1px solid var(--bd);padding:12px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0;}
.topbar-back{background:none;border:none;color:var(--tx2);font-size:22px;cursor:pointer;padding:0;line-height:1;display:none;}
.topbar-title{font-family:'Syne',sans-serif;font-size:16px;font-weight:800;flex:1;}
.topbar-comm{font-size:11px;color:var(--tx3);}
.topbar-dot{width:7px;height:7px;border-radius:50%;background:var(--g);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}
/* MAIN */
.main{flex:1;overflow-y:auto;padding-bottom:70px;}
/* BOTTOM NAV */
.bnav{position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:1px solid var(--bd);display:flex;z-index:50;padding-bottom:env(safe-area-inset-bottom);}
.bni{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 4px 6px;cursor:pointer;font-size:9px;color:var(--tx3);background:none;border:none;font-family:var(--f);position:relative;transition:color .15s;}
.bni.active{color:var(--g);}
.bni-ico{font-size:21px;line-height:1;}
.bni-badge{position:absolute;top:4px;right:calc(50% - 16px);background:var(--r);color:#fff;border-radius:99px;font-size:9px;font-weight:800;padding:0 4px;min-width:15px;text-align:center;display:none;}
/* SCREENS */
.screen{display:none;padding:16px;}
.screen.active{display:block;}
/* SECCIÓN HEADER */
.sec-header{font-family:'Syne',sans-serif;font-size:16px;font-weight:800;margin-bottom:14px;}
/* CARDS */
.card{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--rad);padding:14px 16px;margin-bottom:10px;}
.card-title{font-weight:700;font-size:14px;margin-bottom:8px;}
/* STATS GRID */
.sg{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:14px;}
.sc{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--rad);padding:14px;position:relative;overflow:hidden;}
.sc::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;}
.sc.g::before{background:var(--g);}
.sc.b::before{background:var(--b);}
.sc.y::before{background:var(--y);}
.sc.r::before{background:var(--r);}
.sc-label{font-size:10px;color:var(--tx3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px;}
.sc-val{font-family:'Syne',sans-serif;font-size:24px;font-weight:900;}
/* BADGES */
.badge{display:inline-block;padding:2px 8px;border-radius:99px;font-size:10px;font-weight:700;}
.b-ok{background:var(--gl);color:var(--g);}
.b-warn{background:rgba(245,158,11,.15);color:var(--y);}
.b-err{background:rgba(239,68,68,.15);color:var(--r);}
.b-neu{background:var(--bg4);color:var(--tx2);}
/* BTNS */
.btn{display:inline-flex;align-items:center;justify-content:center;border:none;border-radius:var(--rads);cursor:pointer;font-family:var(--f);font-weight:700;font-size:13px;transition:all .15s;padding:8px 14px;}
.btn-g{background:var(--g);color:#fff;}
.btn-g:hover{background:var(--gd);}
.btn-r{background:var(--r);color:#fff;}
.btn-neu{background:var(--bg3);color:var(--tx);border:1px solid var(--bd);}
.btn-ko{background:rgba(239,68,68,.12);color:var(--r);border:1px solid rgba(239,68,68,.25);}
.btn-sm{padding:5px 10px;font-size:11px;}
.btn-lg{padding:12px 20px;font-size:14px;}
.btn:disabled{opacity:.5;cursor:not-allowed;}
/* INPUTS */
input,textarea,select{width:100%;background:var(--bg3);border:1px solid var(--bd);border-radius:var(--rads);padding:10px 12px;color:var(--tx);font-family:var(--f);font-size:13px;outline:none;margin-bottom:8px;}
input:focus,textarea:focus{border-color:var(--g);}
label{display:block;font-size:11px;color:var(--tx3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:4px;margin-top:8px;}
label:first-child{margin-top:0;}
/* ALERT */
.alert{border-radius:var(--rads);padding:10px 14px;font-size:12px;margin-bottom:10px;line-height:1.5;}
.a-ok{background:var(--gl);color:var(--g);border:1px solid rgba(22,168,107,.2);}
.a-warn{background:rgba(245,158,11,.1);color:var(--y);border:1px solid rgba(245,158,11,.2);}
.a-err{background:rgba(239,68,68,.1);color:var(--r);border:1px solid rgba(239,68,68,.2);}
.a-info{background:rgba(59,130,246,.1);color:var(--b);border:1px solid rgba(59,130,246,.2);}
/* SECTION TABS */
.sub-tabs{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:14px;-webkit-overflow-scrolling:touch;}
.sub-tab{flex-shrink:0;padding:6px 12px;border-radius:99px;font-size:12px;font-weight:700;cursor:pointer;background:var(--bg3);color:var(--tx2);border:1px solid var(--bd);white-space:nowrap;position:relative;}
.sub-tab.active{background:var(--g);color:#fff;border-color:var(--g);}
.sub-tab .tab-badge{position:absolute;top:-4px;right:-4px;background:var(--r);color:#fff;border-radius:99px;font-size:9px;font-weight:800;padding:0 4px;min-width:14px;text-align:center;display:none;}
/* PROOF IMG */
.proof-img{width:100%;max-height:180px;object-fit:cover;border-radius:var(--rads);cursor:pointer;border:1px solid var(--bd);margin-bottom:6px;}
/* GANADOR */
.ganador-card{background:linear-gradient(135deg,rgba(124,58,237,.15),rgba(168,85,247,.1));border:1px solid rgba(139,92,246,.3);border-radius:var(--rad);padding:18px;margin-bottom:12px;text-align:center;}
/* LOADING */
.loading{display:flex;align-items:center;padding:24px;color:var(--tx3);font-size:13px;}
.spinner{width:18px;height:18px;border:2px solid var(--bd);border-top-color:var(--g);border-radius:50%;animation:spin .7s linear infinite;margin-right:10px;}
@keyframes spin{to{transform:rotate(360deg);}}
/* TOAST */
#toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--bg3);border:1px solid var(--bd);border-radius:var(--rads);padding:10px 18px;font-size:13px;z-index:9999;display:none;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.4);}
/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:none;align-items:flex-end;justify-content:center;}
.modal-bg.open{display:flex;}
.modal{background:var(--bg2);border-radius:16px 16px 0 0;padding:20px;width:100%;max-height:88vh;overflow-y:auto;padding-bottom:calc(20px + env(safe-area-inset-bottom));}
.modal-title{font-family:'Syne',sans-serif;font-size:15px;font-weight:800;margin-bottom:14px;}
/* PROG BAR */
.prog-bar{background:var(--bg3);border-radius:99px;height:6px;overflow:hidden;margin:6px 0 4px;}
.prog-fill{height:100%;background:var(--g);transition:width .5s;}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login">
  <div class="login-box">
    <div class="login-logo">drops<span>.</span></div>
    <div class="login-sub">Panel Organizador</div>
    <div class="lf">
      <label>PIN de la comunidad</label>
      <input id="l-pin" type="text" placeholder="Ej: 1234" style="text-transform:uppercase;" onkeydown="if(event.key==='Enter')doLogin()"/>
      <label>Contraseña</label>
      <input id="l-pw" type="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"/>
    </div>
    <button class="lbtn" onclick="doLogin()">Entrar →</button>
    <div class="lerr" id="l-err"></div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="topbar">
    <button class="topbar-back" id="topbar-back" onclick="goBack()">←</button>
    <div class="topbar-title" id="topbar-title">Dashboard</div>
    <div class="topbar-dot"></div>
    <div class="topbar-comm" id="topbar-comm"></div>
    <button class="btn btn-neu btn-sm" onclick="doLogout()">Salir</button>
  </div>

  <div class="main">
    <!-- DASHBOARD -->
    <div class="screen active" id="s-dashboard">
      <div class="sec-header">📊 Dashboard</div>
      <div class="sg" id="dash-stats">
        <div class="sc g"><div class="sc-label">Participantes</div><div class="sc-val" id="d-total">—</div></div>
        <div class="sc b"><div class="sc-label">Confirmados</div><div class="sc-val" id="d-conf">—</div></div>
        <div class="sc y"><div class="sc-label">Pendientes</div><div class="sc-val" id="d-pend">—</div></div>
        <div class="sc r"><div class="sc-label">Sin pagar</div><div class="sc-val" id="d-sinpag">—</div></div>
      </div>
      <div class="card" id="dash-drop-info"><div class="loading"><div class="spinner"></div>Cargando...</div></div>
      <div class="card" id="dash-ganador-info"></div>
      <div class="card" id="dash-plan-info"></div>
    </div>

    <!-- SECCIONES -->
    <div class="screen" id="s-secciones">
      <div class="sec-header">🎯 Mis Secciones</div>
      <div id="secciones-list"></div>
    </div>

    <!-- PAGOS -->
    <div class="screen" id="s-pagos">
      <div class="sec-header">💳 Pagos</div>
      <div class="sub-tabs" id="pagos-tabs"></div>
      <div style="display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap;">
        <button class="btn btn-g btn-sm pf active" data-f="todos" onclick="setPagFiltro(this)">Todos</button>
        <button class="btn btn-neu btn-sm pf" data-f="pending" onclick="setPagFiltro(this)">⏳ Pendientes</button>
        <button class="btn btn-neu btn-sm pf" data-f="confirmed" onclick="setPagFiltro(this)">✅ Confirmados</button>
        <button class="btn btn-neu btn-sm pf" data-f="reserved" onclick="setPagFiltro(this)">Sin pago</button>
      </div>
      <div id="pagos-list"></div>
    </div>

    <!-- GESTIÓN -->
    <div class="screen" id="s-gestion">
      <div class="sec-header">⚙️ Gestión del Drop</div>
      <div class="sub-tabs" id="gestion-tabs"></div>
      <div id="gestion-content"></div>
    </div>

    <!-- GANADOR -->
    <div class="screen" id="s-ganador">
      <div class="sec-header">🏆 Ganador</div>
      <div class="sub-tabs" id="ganador-tabs"></div>
      <div id="ganador-content"></div>
    </div>

    <!-- STATS -->
    <div class="screen" id="s-stats">
      <div class="sec-header">📊 Estadísticas</div>
      <div id="stats-content"></div>
    </div>

    <!-- CATÁLOGO -->
    <div class="screen" id="s-catalogo">
      <div class="sec-header">📦 Catálogo</div>
      <input type="text" id="cat-q" placeholder="Buscar..." oninput="renderCat()"/>
      <div style="display:flex;gap:5px;margin-bottom:12px;overflow-x:auto;padding-bottom:4px;">
        <button class="btn btn-g btn-sm cf active" data-f="todos" onclick="setCF(this)">Todos</button>
        <button class="btn btn-neu btn-sm cf" data-f="cana" onclick="setCF(this)">🎣 Cañas</button>
        <button class="btn btn-neu btn-sm cf" data-f="carrete" onclick="setCF(this)">🔄 Carretes</button>
        <button class="btn btn-neu btn-sm cf" data-f="señuelo" onclick="setCF(this)">🦑 Señuelos</button>
        <button class="btn btn-neu btn-sm cf" data-f="combo" onclick="setCF(this)">🎁 Combos</button>
      </div>
      <div id="cat-list"></div>
    </div>

    <!-- NOTIFICACIONES -->
    <div class="screen" id="s-notifs">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">
        <div class="sec-header" style="margin:0;">🔔 Notificaciones</div>
        <button class="btn btn-neu btn-sm" onclick="loadNotifs()">↻</button>
      </div>
      <div id="notifs-list"></div>
    </div>
  </div>

  <!-- BOTTOM NAV -->
  <nav class="bnav">
    <button class="bni active" data-s="dashboard" onclick="goScreen('dashboard')"><span class="bni-ico">📊</span>Inicio</button>
    <button class="bni" data-s="secciones" onclick="goScreen('secciones')"><span class="bni-ico">🎯</span>Secciones</button>
    <button class="bni" data-s="pagos" onclick="goScreen('pagos')"><span class="bni-ico">💳</span>Pagos<span class="bni-badge" id="badge-pagos"></span></button>
    <button class="bni" data-s="gestion" onclick="goScreen('gestion')"><span class="bni-ico">⚙️</span>Gestión</button>
    <button class="bni" data-s="notifs" onclick="goScreen('notifs')"><span class="bni-ico">🔔</span>Notifs<span class="bni-badge" id="badge-notifs"></span></button>
  </nav>
</div>

<!-- MODAL IMAGEN -->
<div class="modal-bg" id="modal-img" onclick="if(event.target===this)this.classList.remove('open')">
  <div class="modal">
    <div class="modal-title">Comprobante</div>
    <img id="modal-img-src" style="width:100%;border-radius:var(--rads);max-height:65vh;object-fit:contain;"/>
    <button class="btn btn-neu" style="width:100%;margin-top:12px;" onclick="document.getElementById('modal-img').classList.remove('open')">Cerrar</button>
  </div>
</div>

<div id="toast"></div>

<script type="module">
import{initializeApp}from'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
import{getFirestore,collection,doc,getDoc,getDocs,updateDoc,addDoc,onSnapshot,serverTimestamp,query,where,writeBatch,setDoc,deleteField}from'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';
import{getStorage,ref,uploadBytes,getDownloadURL}from'https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js';

const fbApp=initializeApp({apiKey:"AIzaSyBoh-OnF_G4_N8YwhWHOAsqIOS1B1tzkkA",authDomain:"drops-oficial.firebaseapp.com",projectId:"drops-oficial",storageBucket:"drops-oficial.firebasestorage.app",messagingSenderId:"725158698993",appId:"1:725158698993:web:d7e1ecbb73bfcefc676e50"});
const db=getFirestore(fbApp);
const storage=getStorage(fbApp,'gs://drops-oficial.firebasestorage.app');

// ── ESTADO ────────────────────────────────────────────────────
let commId=null,commData=null;
let activeSub=null; // subId activo
let allParts={}; // subId -> {num -> participant}
let catDocs=[];
let pagFiltro='todos';
let catFiltro='todos';
let _unsubMap={}; // subId -> unsub function
let _unsubNotifs=null;
let _unsubSuperNotifs=null;

// ── UTILS ─────────────────────────────────────────────────────
function toast(m,d=3000){const e=document.getElementById('toast');e.textContent=m;e.style.display='block';clearTimeout(e._t);e._t=setTimeout(()=>e.style.display='none',d);}
function getSubs(){return Object.values(commData?.subs||{});}
function getSubIds(){return Object.keys(commData?.subs||{});}
function partsOf(sid){return Object.values(allParts[sid]||{});}

// ── LOGIN ─────────────────────────────────────────────────────
const saved=localStorage.getItem('dca2');
if(saved){try{const o=JSON.parse(saved);commId=o.c;activeSub=o.s;init();}catch(_){localStorage.removeItem('dca2');}}

window.doLogin=async function(){
  const pin=document.getElementById('l-pin').value.trim().toUpperCase();
  const pw=document.getElementById('l-pw').value.trim();
  const err=document.getElementById('l-err');
  err.textContent='';
  if(!pin||!pw){err.textContent='Rellena todos los campos';return;}
  try{
    const snap=await getDocs(collection(db,'communities'));
    let found=null;
    snap.forEach(d=>{
      const dd=d.data();
      if(dd.pin===pin||dd.name?.toUpperCase()===pin)found={id:d.id,...dd};
    });
    if(!found){err.textContent='Comunidad no encontrada';return;}
    if(!found.adminPassOrg){err.textContent='Sin contraseña de organizador. Contacta con el administrador.';return;}
    if(found.adminPassOrg!==pw){err.textContent='Contraseña incorrecta';return;}
    commId=found.id;
    const subs=Object.values(found.subs||{});
    activeSub=subs[0]?.id||null;
    localStorage.setItem('dca2',JSON.stringify({c:commId,s:activeSub}));
    init();
  }catch(e){err.textContent='Error: '+e.message;}
};

window.doLogout=function(){localStorage.removeItem('dca2');location.reload();};

// ── INIT ──────────────────────────────────────────────────────
async function init(){
  try{
    const snap=await getDoc(doc(db,'communities',commId));
    if(!snap.exists()){toast('Comunidad no encontrada');return;}
    commData={id:snap.id,...snap.data()};
    if(!activeSub){const subs=getSubs();activeSub=subs[0]?.id||null;}
    document.getElementById('topbar-comm').textContent=commData.name||commId;
    document.title='Drops · '+(commData.name||commId);
    document.getElementById('login').style.display='none';
    document.getElementById('app').classList.add('show');
    // Escuchar participantes de todas las secciones
    getSubIds().forEach(sid=>escucharParts(sid));
    // Escuchar notificaciones
    escucharNotifs();
    // Pedir permiso push
    if('Notification' in window&&Notification.permission==='default')Notification.requestPermission();
    loadDashboard();
  }catch(e){document.getElementById('l-err').textContent='Error: '+e.message;document.getElementById('login').style.display='flex';}
}

// ── NAVEGACIÓN ────────────────────────────────────────────────
const SCREEN_TITLES={dashboard:'Dashboard',secciones:'Secciones',pagos:'Pagos',gestion:'Gestión del Drop',ganador:'Ganador',stats:'Estadísticas',catalogo:'Catálogo',notifs:'Notificaciones'};

window.goScreen=function(name){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.bni').forEach(b=>b.classList.toggle('active',b.dataset.s===name));
  document.getElementById('s-'+name)?.classList.add('active');
  document.getElementById('topbar-title').textContent=SCREEN_TITLES[name]||name;
  document.getElementById('topbar-back').style.display='none';
  if(name==='dashboard')loadDashboard();
  if(name==='secciones')loadSecciones();
  if(name==='pagos')loadPagosTabs();
  if(name==='gestion')loadGestionTabs();
  if(name==='ganador')loadGanadorTabs();
  if(name==='stats')loadStats();
  if(name==='catalogo')loadCatalogo();
  if(name==='notifs'){loadNotifs();marcarNotifsLeidas();}
};

window.goBack=function(){
  document.getElementById('topbar-back').style.display='none';
};

// ── PARTICIPANTES RT ──────────────────────────────────────────
function escucharParts(sid){
  if(_unsubMap[sid])_unsubMap[sid]();
  if(!allParts[sid])allParts[sid]={};
  let _primera=true;
  _unsubMap[sid]=onSnapshot(collection(db,'communities',commId,'subs',sid,'participants'),snap=>{
    const prevPend=Object.values(allParts[sid]||{}).filter(p=>p.status==='pending').length;
    allParts[sid]={};
    snap.forEach(d=>allParts[sid][d.data().num]={id:d.id,...d.data()});
    actualizarBadgePagos();
    if(!_primera){
      const newPend=Object.values(allParts[sid]).filter(p=>p.status==='pending').length;
      if(newPend>prevPend&&Notification.permission==='granted'){
        const nuevos=snap.docChanges().filter(c=>c.type==='modified'&&c.doc.data().status==='pending'&&c.doc.data().proofUrl);
        if(nuevos.length){
          const sub=commData?.subs?.[sid];
          const p=nuevos[0].doc.data();
          const n=new Notification('💳 Comprobante recibido — '+(sub?.name||sid),{
            body:(p.name||'Participante')+' — Nºs: '+Object.values(allParts[sid]).filter(x=>x.name===p.name&&x.status==='pending').map(x=>x.num).sort((a,b)=>a-b).join(', '),
            icon:'/favicon.ico',requireInteraction:true
          });
          n.onclick=()=>{window.focus();goScreen('pagos');};
        }
      }
    }
    _primera=false;
    if(document.getElementById('s-pagos')?.classList.contains('active')&&activeSub===sid)renderPagos();

// ── NOTIFICACIONES RT ─────────────────────────────────────────
function escucharNotifs(){
  if(_unsubSuperNotifs)_unsubSuperNotifs();
  let _primera=true;
  _unsubSuperNotifs=onSnapshot(collection(db,'superadmin','notificaciones'),snap=>{
    let noLeidas=snap.docs.filter(d=>d.data().commId===commId&&!d.data().leida).length;
    const b=document.getElementById('badge-notifs');
    if(b){b.textContent=noLeidas;b.style.display=noLeidas>0?'inline':'none';}
    if(!_primera){
      snap.docChanges().forEach(change=>{
        if(change.type==='added'){
          const data=change.doc.data();
          if(data.commId===commId&&!data.leida&&Notification.permission==='granted'){
            new Notification(data.text||'Nueva notificación',{body:data.sub||'',icon:'/favicon.ico'});
          }
        }
      });
    }
    _primera=false;
  });
}

function marcarNotifsLeidas(){
  getDocs(collection(db,'superadmin','notificaciones')).then(snap=>{
    const b=writeBatch(db);
    snap.forEach(d=>{if(d.data().commId===commId&&!d.data().leida)b.update(d.ref,{leida:true});});
    b.commit().catch(()=>{});
    const badge=document.getElementById('badge-notifs');
    if(badge)badge.style.display='none';
  }).catch(()=>{});
}

function buildSubTabs(containerId,onSelect){
  const el=document.getElementById(containerId);if(!el)return;

  getSubs().forEach(s=>{
    const parts=Object.values(allParts[s.id]||{});

    btn.className='sub-tab'+(s.id===activeSub?' active':'');
    btn.innerHTML=`${s.emoji||'🎯'} ${s.name||s.id}${pend>0?`<span class="tab-badge" style="display:inline;">${pend}</span>`:''}`;

      document.querySelectorAll('#'+containerId+' .sub-tab').forEach(b=>b.classList.remove('active'));

window.setPagFiltro=function(btn){

function renderPagos(){
  const el=document.getElementById('pagos-list');el.innerHTML='';
  const parts=Object.values(allParts[activeSub]||{});
  const grouped={};
  parts.forEach(p=>{
    if(pagFiltro!=='todos'&&p.status!==pagFiltro)return;
    const k=(p.name||'')+'_'+(p.phone||'');
    if(!grouped[k])grouped[k]={name:p.name,phone:p.phone,nums:[],status:p.status,proofUrl:null,method:p.method,pagoRef:p.pagoRef,ids:[],ocr:false};
    grouped[k].nums.push(p.num);grouped[k].ids.push(p.id);
    if(p.status==='pending')grouped[k].status='pending';
    if(p.proofUrl)grouped[k].proofUrl=p.proofUrl;
    if(p.ocrVerificado)grouped[k].ocr=true;
  });
  const gs=Object.values(grouped).sort((a,b)=>a.status==='pending'?-1:1);
  if(!gs.length){el.innerHTML='<div class="alert a-info">Sin pagos para mostrar.</div>';return;}
  gs.forEach(g=>{
    const div=document.createElement('div');div.className='card';
    const sb=g.status==='pending'
      ?`<span class="badge b-warn">⏳${g.ocr?' 🤖':' ⚠️'}</span>`
      :g.status==='confirmed'?`<span class="badge b-ok">${g.ocr?'🤖 ':''}✅</span>`
      :'<span class="badge b-err">Sin pago</span>';
    div.innerHTML=`
      <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px;">
        <div>
          <div style="font-weight:700;font-size:14px;">${g.name||'—'}</div>
          <div style="font-size:12px;color:var(--tx2);">${g.phone||'—'}</div>
          <div style="font-size:12px;color:var(--tx2);">Nºs: ${g.nums.sort((a,b)=>a-b).join(', ')}</div>
          ${g.pagoRef?`<div style="font-size:11px;color:var(--tx3);">Ref: ${g.pagoRef}</div>`:''}
          ${g.method?`<div style="font-size:11px;color:var(--tx3);">${g.method}</div>`:''}
        </div>
        ${sb}
      </div>
      ${g.proofUrl
        ?`<img class="proof-img" src="${g.proofUrl}" onclick="verImagen('${g.proofUrl}')"/>
           <button class="btn btn-neu btn-sm" style="width:100%;margin-bottom:8px;" onclick="verImagen('${g.proofUrl}')">🖼 Ver comprobante</button>`
        :`<div style="font-size:11px;color:var(--tx3);padding:8px;background:var(--bg3);border-radius:var(--rads);margin-bottom:8px;">📎 Sin comprobante</div>`
      }
      ${g.status==='pending'?`<div style="display:flex;gap:8px;">
        <button class="btn btn-g btn-sm" style="flex:1;" onclick="confirmarPago('${g.ids.join(',')}')">✅ Confirmar</button>
        <button class="btn btn-ko btn-sm" style="flex:1;" onclick="rechazarPago('${g.ids.join(',')}')">❌ Rechazar</button></div>`:''}`;
    el.appendChild(div);
  });
}

window.realizarSorteo=async function(){
  if(!window._sorteoFile){toast('Sube la foto del cupón');return;}
  const numStr=document.getElementById('g-sorteo-num').value.trim();
  if(!numStr){toast('Introduce el número ganador');return;}
  const numGanador=parseInt(numStr);
  if(!confirm('¿El número ganador es el '+numGanador+'?'))return;
  const btn=document.getElementById('btn-sorteo');btn.disabled=true;btn.textContent='Procesando...';
  try{
    let drawUrl='';
    try{const sr=ref(storage,`${commId}/${activeSub}/sorteo/${Date.now()}.jpg`);const sn=await uploadBytes(sr,window._sorteoFile);drawUrl=await getDownloadURL(sn.ref);}catch(_){}
    const ganador=Object.values(allParts[activeSub]||{}).find(p=>p.num===numGanador&&p.status==='confirmed');
    if(!ganador){toast('⚠️ Ese número no está confirmado');btn.disabled=false;btn.textContent='🎰 Realizar sorteo';return;}
    const cfg=commData?.subs?.[activeSub]?.config||{};
    const ganadorData={name:ganador.name,phone:ganador.phone,num:numGanador,drawUrl,premios:cfg.premios||'',fecha:new Date().toLocaleDateString('es-ES'),ts:Date.now()};
    await updateDoc(doc(db,'communities',commId),{
      [`subs.${activeSub}.ultimoGanador`]:ganadorData,
      [`subs.${activeSub}.config.rifaActiva`]:false,
      [`subs.${activeSub}.pagosAbiertos`]:false
    });
    // Notificar al ganador
    const ganUid=ganador.uid;
    if(ganUid){
      try{await addDoc(collection(db,'users',ganUid,'notificaciones'),{icon:'🏆',text:'¡Eres el ganador!',sub:'Has ganado el drop '+cfg.rifaName+'. Entra en la app para elegir tu premio y enviar tu dirección.',tipo:'info',leida:false,ts:serverTimestamp()});}catch(_){}
    }
    window._sorteoFile=null;
    toast('🏆 Ganador: '+ganador.name+' — Nº'+numGanador);
    goScreen('ganador');
  }catch(e){toast('Error: '+e.message);}
  btn.disabled=false;btn.textContent='🎰 Realizar sorteo';
};

window.cerrarDropComm=async function(){
  if(!confirm('¿Cerrar este drop y guardarlo en el historial?'))return;
  try{
    const cfg=commData?.subs?.[activeSub]?.config||{};
    const gan=commData?.subs?.[activeSub]?.ultimoGanador;
    await addDoc(collection(db,'communities',commId,'subs',activeSub,'historial'),{
      rifaName:cfg.rifaName||'',ganador:gan?.name||'',numGanador:gan?.num||null,
      fecha:new Date().toLocaleDateString('es-ES'),ts:serverTimestamp()
    });
    const b=writeBatch(db);
    Object.values(allParts[activeSub]||{}).forEach(p=>b.delete(doc(db,'communities',commId,'subs',activeSub,'participants',p.id)));
    await b.commit();
    await updateDoc(doc(db,'communities',commId),{
      [`subs.${activeSub}.config.rifaActiva`]:false,
      [`subs.${activeSub}.pagosAbiertos`]:false,
      [`subs.${activeSub}.ultimoGanador`]:null,
      [`subs.${activeSub}.ganadorEleccion`]:null
    });
    toast('✅ Drop cerrado');goScreen('dashboard');
  }catch(e){toast('Error: '+e.message);}
};

    </div>
    ${elec?`
    <div class="card">
      <div class="card-title">📦 Datos de envío</div>
      <div style="display:grid;gap:8px;">
        <div style="background:var(--bg3);border-radius:var(--rads);padding:10px 12px;">
          <div style="font-size:10px;color:var(--tx3);text-transform:uppercase;margin-bottom:3px;">Premio elegido</div>
          <div style="font-weight:700;">${(elec.premio||'—').replace(/#\d+\s*/g,'')}</div>
        </div>
        <div style="background:var(--bg3);border-radius:var(--rads);padding:10px 12px;">
          <div style="font-size:10px;color:var(--tx3);text-transform:uppercase;margin-bottom:3px;">Dirección de envío</div>
          <div style="font-weight:700;">${elec.direccion||'—'}</div>
        </div>
        <div style="background:var(--bg3);border-radius:var(--rads);padding:10px 12px;">
          <div style="font-size:10px;color:var(--tx3);text-transform:uppercase;margin-bottom:3px;">Teléfono</div>
          <div style="font-weight:700;">${elec.telefono||'—'}</div>
          ${elec.telefono?`<a href="https://wa.me/34${elec.telefono.replace(/\D/g,'')}" target="_blank" class="btn btn-g btn-sm" style="margin-top:8px;display:inline-flex;text-decoration:none;">💬 WhatsApp</a>`:''}
        </div>
        ${elec.comentarios?`<div style="background:var(--bg3);border-radius:var(--rads);padding:10px 12px;"><div style="font-size:10px;color:var(--tx3);text-transform:uppercase;margin-bottom:3px;">Comentarios</div><div>${elec.comentarios}</div></div>`:''}
        <div style="font-size:11px;color:var(--tx3);">Recibido el ${elec.fecha||'—'}</div>
      </div>
    </div>`
    :'<div class="alert a-warn">⏳ El ganador aún no ha enviado su dirección y elección de premio.</div>'}
    ${gan.premios?`<div class="card"><div class="card-title">🎁 Premios</div>${gan.premios.split('\n').filter(p=>p.trim()).map(p=>`<div style="padding:5px 0;border-bottom:1px solid var(--bd);font-size:13px;">• ${p.trim().replace(/#\d+\s*/g,'')}</div>`).join('')}</div>`:''}
  `;
}

// ── STATS ─────────────────────────────────────────────────────
async function loadStats(){
  const el=document.getElementById('stats-content');
  el.innerHTML='<div class="loading"><div class="spinner"></div>Cargando...</div>';
  try{const s=await getDoc(doc(db,'communities',commId));commData={id:s.id,...s.data()};}catch(_){}
  const planKey=commData?.plan||'pay_per_drop';
  const PLANES={
    pay_per_drop:{emoji:'🎯',nombre:'Pay per Drop',fijo:false},
    basico:{emoji:'⭐',nombre:'Básico',precio:150,fijo:true},
    pro:{emoji:'🚀',nombre:'Pro',precio:200,fijo:true,rifaGratis:true},
    premium:{emoji:'👑',nombre:'Premium',precio:300,fijo:true,rifaGratis:true,embajadores:true},
  };
  const planObj=PLANES[planKey]||PLANES.pay_per_drop;
  // Stats globales
  let totalParts=0,totalConf=0,totalRec=0;
  getSubs().forEach(sid=>{
    const cfg=commData?.subs?.[sid]?.config||{};
    const p=Object.values(allParts[sid]||{});
    const precio=cfg.price||12;
    totalParts+=p.length;
    const conf=p.filter(x=>x.status==='confirmed').length;
    totalConf+=conf;totalRec+=conf*precio;
  });
  // Historial
  let historial=[];
  try{
    for(const sid of getSubIds()){
      const snap=await getDocs(collection(db,'communities',commId,'subs',sid,'historial'));
      snap.forEach(d=>historial.push({id:d.id,...d.data()}));
    }
    historial.sort((a,b)=>(b.ts?.seconds||0)-(a.ts?.seconds||0));
  }catch(_){}
  const mes=new Date().toISOString().slice(0,7);
  const rifasMes=historial.filter(h=>h.ts?.seconds&&new Date(h.ts.seconds*1000).toISOString().slice(0,7)===mes).length;
  // Estado pago suscripción
  let estadoPago='sin_pago';
  try{
    const fs=await getDoc(doc(db,'superadmin','facturacion','pagos_suscripcion',commId+'_'+mes));
    if(fs.exists())estadoPago=fs.data().estado||'pendiente';
  }catch(_){}

  el.innerHTML=`
    <div class="sg">
      <div class="sc g"><div class="sc-label">Total partic.</div><div class="sc-val">${totalParts}</div></div>
      <div class="sc b"><div class="sc-label">Confirmados</div><div class="sc-val">${totalConf}</div></div>
      <div class="sc y"><div class="sc-label">Recaudado</div><div class="sc-val">${totalRec}€</div></div>
      <div class="sc r"><div class="sc-label">Drops este mes</div><div class="sc-val">${rifasMes}</div></div>
    </div>

    <div class="card" style="border-color:rgba(59,130,246,.3);">
      <div class="card-title">📋 Tu plan</div>
      <div style="font-size:20px;font-weight:900;margin-bottom:4px;">${planObj.emoji} ${planObj.nombre}</div>
      ${planObj.fijo
        ?`<div style="font-size:13px;color:var(--tx2);margin-bottom:8px;">${planObj.precio}€/mes · Rifas ilimitadas</div>`
        :`<div style="font-size:13px;color:var(--tx2);margin-bottom:8px;">Pago por rifa: 1-3=25€ · 4-10=15€ · 11+=10€</div>`
      }
      <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;">
        <span class="badge b-ok">✓ Catálogo</span>
        ${planObj.rifaGratis?'<span class="badge b-ok">✓ 1 rifa gratis/mes</span>':''}
        ${planObj.embajadores?'<span style="background:rgba(139,92,246,.15);color:#a78bfa;border-radius:99px;font-size:10px;font-weight:700;padding:2px 8px;">✓ Embajadores</span>':''}
      </div>
      ${planObj.fijo?`
        ${estadoPago==='confirmado'
          ?'<div class="alert a-ok">✅ Suscripción pagada este mes</div>'
          :estadoPago==='pendiente'
            ?'<div class="alert a-warn">⏳ Comprobante enviado — pendiente de confirmación</div>'
            :`<button class="btn btn-g" style="width:100%;padding:11px;" onclick="abrirPagoSuscripcion('${planKey}','${planObj.precio}')">💶 Pagar suscripción — ${planObj.precio}€/mes</button>`
        }`:''}
    </div>

    ${!planObj.fijo?`
    <div class="card" style="border-color:rgba(245,158,11,.3);">
      <div class="card-title">💶 Siguiente pago a Drops Oficial</div>
      <div style="font-size:26px;font-weight:900;color:var(--y);margin-bottom:6px;">${rifasMes<3?25:rifasMes<10?15:10}€</div>
      <div style="font-size:12px;color:var(--tx2);margin-bottom:10px;">Próxima rifa nº${rifasMes+1} de este mes</div>
      <div style="background:var(--bg3);border-radius:var(--rads);padding:12px;font-size:13px;">
        <div style="margin-bottom:5px;">📱 Bizum: <strong>634 XX XX XX</strong>
          <button onclick="navigator.clipboard.writeText('634XXXXXXX').then(()=>toast('✓'))" class="btn btn-neu btn-sm" style="margin-left:5px;">📋</button></div>
        <div>🏦 IBAN: <strong style="font-size:11px;">ES65 1583 0001 1590 6984 8933</strong>
          <button onclick="navigator.clipboard.writeText('ES6515830001159069848933').then(()=>toast('✓'))" class="btn btn-neu btn-sm" style="margin-left:5px;">📋</button></div>
      </div>
    </div>`:''}

    <div class="card">
      <div class="card-title">📋 Historial de drops</div>
      ${historial.length
        ?historial.slice(0,10).map(h=>`
          <div style="padding:8px 0;border-bottom:1px solid var(--bd);font-size:13px;">
            <div style="font-weight:600;">${h.rifaName||'Drop'}</div>
            <div style="font-size:11px;color:var(--tx3);">${h.fecha||''} · Ganador: ${h.ganador||'—'}</div>
          </div>`).join('')
        :'<div style="color:var(--tx3);font-size:13px;">Sin historial aún</div>'}
    </div>`;
}

// Pago suscripción
window.abrirPagoSuscripcion=function(planKey,precio){
  let m=document.getElementById('modal-pago-susc');
  if(!m){m=document.createElement('div');m.id='modal-pago-susc';m.className='modal-bg';m.onclick=function(e){if(e.target===this)this.classList.remove('open');};document.body.appendChild(m);}
  m.innerHTML=`<div class="modal">
    <div class="modal-title">💳 Pago de suscripción</div>
    <div style="font-size:26px;font-weight:900;color:var(--y);margin-bottom:8px;">${precio}€/mes</div>
    <div style="background:var(--bg3);border-radius:var(--rads);padding:12px;margin-bottom:10px;font-size:13px;">
      <div style="margin-bottom:5px;">📱 Bizum: <strong>634 XX XX XX</strong>
        <button onclick="navigator.clipboard.writeText('634XXXXXXX').then(()=>toast('✓'))" class="btn btn-neu btn-sm" style="margin-left:5px;">📋</button></div>
      <div>🏦 IBAN: <strong style="font-size:11px;">ES65 1583 0001 1590 6984 8933</strong>
        <button onclick="navigator.clipboard.writeText('ES6515830001159069848933').then(()=>toast('✓'))" class="btn btn-neu btn-sm" style="margin-left:5px;">📋</button></div>
      <div style="font-size:11px;color:var(--tx3);margin-top:6px;">Concepto: ${commData?.name||commId} — ${new Date().toLocaleDateString('es-ES',{month:'long',year:'numeric'})}</div>
    </div>
    <div style="background:var(--bg3);border:2px dashed var(--bd);border-radius:var(--rads);padding:14px;text-align:center;cursor:pointer;margin-bottom:8px;" onclick="document.getElementById('susc-file').click()">
      <div style="font-size:22px;">📸</div>
      <div style="font-size:12px;color:var(--tx2);" id="susc-file-txt">Subir comprobante</div>
    </div>
    <input type="file" id="susc-file" accept="image/*" style="display:none;" onchange="onSuscFile(this)"/>
    <img id="susc-prev" style="display:none;width:100%;max-height:130px;object-fit:cover;border-radius:var(--rads);margin-bottom:8px;"/>
    <button id="btn-susc" class="btn btn-g" style="width:100%;padding:12px;" onclick="enviarSusc('${planKey}','${precio}')" disabled>📤 Enviar comprobante</button>
    <button class="btn btn-neu" style="width:100%;margin-top:8px;" onclick="document.getElementById('modal-pago-susc').classList.remove('open')">Cancelar</button>
  </div>`;
  m.classList.add('open');
};

window.onSuscFile=function(input){
  const file=input.files[0];if(!file)return;
  window._suscFile=file;
  document.getElementById('susc-file-txt').textContent=file.name;
  const r=new FileReader();r.onload=e=>{const img=document.getElementById('susc-prev');img.src=e.target.result;img.style.display='block';};r.readAsDataURL(file);
  document.getElementById('btn-susc').disabled=false;
};

window.enviarSusc=async function(planKey,precio){
  if(!window._suscFile){toast('Sube el comprobante');return;}
  const btn=document.getElementById('btn-susc');btn.disabled=true;btn.textContent='Enviando...';
  try{
    let proofUrl=null;
    try{const sr=ref(storage,`${commId}/suscripcion/${Date.now()}.jpg`);const sn=await uploadBytes(sr,window._suscFile);proofUrl=await getDownloadURL(sn.ref);}
    catch(_){proofUrl=await new Promise((res,rej)=>{const r=new FileReader();r.onload=e=>res(e.target.result);r.onerror=rej;r.readAsDataURL(window._suscFile);});}
    const mes=new Date().toISOString().slice(0,7);
    await setDoc(doc(db,'superadmin','facturacion','pagos_suscripcion',commId+'_'+mes),{
      commId,commName:commData?.name||commId,planKey,precio:Number(precio),
      estado:'pendiente',proofUrl:proofUrl||'',mes,ts:serverTimestamp()
    });
    await addDoc(collection(db,'superadmin','notificaciones'),{
      icon:'💳',text:'Comprobante suscripción recibido',
      sub:(commData?.name||commId)+' — '+precio+'€ — '+planKey,
      tipo:'accion',commId,leida:false,ts:serverTimestamp()
    });
    document.getElementById('modal-pago-susc').classList.remove('open');
    toast('✅ Enviado. Te confirmaremos pronto.');
    window._suscFile=null;
    loadStats();
  }catch(e){toast('Error: '+e.message);}
  btn.disabled=false;btn.textContent='📤 Enviar comprobante';
};

// ── CATÁLOGO ──────────────────────────────────────────────────
async function loadCatalogo(){
  const el=document.getElementById('cat-list');
  el.innerHTML='<div class="loading"><div class="spinner"></div>Cargando...</div>';
  try{
    const snap=await getDocs(collection(db,'communities',commId,'catalogo'));
    catDocs=[];snap.forEach(d=>catDocs.push({id:d.id,...d.data()}));
    catDocs.sort((a,b)=>parseInt(a.ref||999)-parseInt(b.ref||999));
    renderCat();
  }catch(e){el.innerHTML='<div class="alert a-err">Error: '+e.message+'</div>';}
}

window.setCF=function(btn){
  catFiltro=btn.dataset.f;
  document.querySelectorAll('.cf').forEach(b=>{b.className='btn btn-sm cf';b.classList.add(b===btn?'btn-g':'btn-neu');});
  renderCat();
};

window.renderCat=function(){
  const el=document.getElementById('cat-list');if(!el)return;
  el.innerHTML='';
  const q=(document.getElementById('cat-q')?.value||'').toLowerCase().replace('#','');
  const f=catDocs.filter(p=>{
    const fOk=catFiltro==='todos'||(catFiltro==='combo'&&p.esCombo)||(p.categoria===catFiltro||p.subcategoria===catFiltro);
    const qOk=!q||(p.ref&&p.ref.includes(q))||(p.nombre&&p.nombre.toLowerCase().includes(q))||(p.marca&&p.marca.toLowerCase().includes(q));
    return fOk&&qOk;
  });
  if(!f.length){el.innerHTML='<div class="alert a-info">Sin resultados.</div>';return;}
  f.forEach(p=>{
    const div=document.createElement('div');div.className='card';div.style.marginBottom='8px';
    const precio=p.precioTotalAdmin||p.precioMin||p.precio;
    div.innerHTML=`<div style="display:flex;align-items:center;justify-content:space-between;gap:8px;">
      <div style="flex:1;">
        <div style="display:flex;align-items:center;gap:5px;margin-bottom:3px;">
          <span style="background:var(--g);color:#fff;border-radius:4px;padding:1px 5px;font-size:10px;font-weight:800;">#${p.ref||'?'}</span>
          ${p.esCombo?'<span style="background:rgba(139,92,246,.2);color:#a78bfa;border-radius:4px;padding:1px 5px;font-size:10px;">COMBO</span>':''}
          <span style="font-size:13px;font-weight:700;">${p.nombre||''}</span>
        </div>
        ${p.marca?`<div style="font-size:11px;color:var(--tx3);">${p.marca}</div>`:''}
        ${precio?`<div style="font-size:12px;color:var(--g);font-weight:700;">${precio}€${p.esCombo?' 🎁':''}</div>`:''}
      </div>
      ${p.link?`<a href="${p.link}" target="_blank" class="btn btn-neu btn-sm" style="text-decoration:none;flex-shrink:0;">🔗</a>`:''}
    </div>`;
    el.appendChild(div);
  });
};

// ── NOTIFICACIONES ────────────────────────────────────────────
async function loadNotifs(){
  const el=document.getElementById('notifs-list');
  el.innerHTML='<div class="loading"><div class="spinner"></div>Cargando...</div>';
  try{
    const snap=await getDocs(collection(db,'superadmin','notificaciones'));
    const notifs=snap.docs.map(d=>({id:d.id,...d.data()}))
      .filter(n=>!n.commId||n.commId===commId)
      .sort((a,b)=>(b.ts?.seconds||0)-(a.ts?.seconds||0));
    el.innerHTML='';
    if(!notifs.length){el.innerHTML='<div class="alert a-info">Sin notificaciones.</div>';return;}
    notifs.slice(0,30).forEach(n=>{
      const div=document.createElement('div');div.className='card';div.style.marginBottom='8px';
      div.innerHTML=`<div style="display:flex;gap:10px;align-items:flex-start;">
        <span style="font-size:22px;">${n.icon||'🔔'}</span>
        <div style="flex:1;">
          <div style="font-weight:700;font-size:13px;">${n.text||''}</div>
          ${n.sub?`<div style="font-size:12px;color:var(--tx2);margin-top:3px;white-space:pre-wrap;">${n.sub}</div>`:''}
          <div style="font-size:10px;color:var(--tx3);margin-top:4px;">${n.ts?.toDate?.()?.toLocaleString('es-ES')||''}</div>
        </div>
        ${!n.leida?'<span class="badge b-warn">Nueva</span>':''}
      </div>`;
      el.appendChild(div);
    });
    // Marcar leídas
    const b=writeBatch(db);
    notifs.filter(n=>!n.leida&&n.commId===commId).forEach(n=>b.update(doc(db,'superadmin','notificaciones',n.id),{leida:true}));
    b.commit().catch(()=>{});
  }catch(e){el.innerHTML='<div class="alert a-err">Error: '+e.message+'</div>';}
}
</script>
